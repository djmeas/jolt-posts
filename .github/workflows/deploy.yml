# Deploy: GitHub Actions SSHs to your VPS, then the VPS runs git + Docker.
#
# --- One-time: HTTPS for `git pull` on the VPS (private repo) ---
#
# 1) GitHub → Settings → Developer settings → Personal access tokens
#    - Fine-grained: only this repo, Contents → Read-only
#    - Or classic: enable "repo" if the repo is private
#
# 2) On the VPS (once), in your deploy directory:
#      git remote set-url origin https://github.com/OWNER/REPO.git
#      git config --global credential.helper store
#      git pull
#    When prompted: GitHub username + PAT as password (stored in ~/.git-credentials).
#
#    Non-interactive alternative (same effect):
#      printf 'https://YOUR_GITHUB_USERNAME:YOUR_PAT@github.com\n' >> ~/.git-credentials
#      chmod 600 ~/.git-credentials
#      git config --global credential.helper store
#
# 3) Repo Settings → Secrets and variables → Actions, add:
#      VPS_HOST, VPS_USER, VPS_SSH_KEY (private key for SSH *into* the VPS),
#      DEPLOY_PATH (absolute path to the repo on the server, e.g. /home/deploy/jolt-template)

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin main
            git reset --hard origin/main
            docker compose up -d --build
